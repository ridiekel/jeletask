teletask:
  configFile: "classpath:/test-config.json"
  central:
    host: "localhost"
    port: 0
    id: "MAN_TEST_${teletask.central.host}"
    version: "@project.version@"
  mqtt:
#    host: "localhost"
#    port: 1883
#    username: ""
#    password: ""
    retained: "false"
    clientId: "test_client_id_teletask2mqtt"
    prefix: "test_prefix_teletask2mqtt"
  test:
    headless: true
    timeout: 5000
    gitlabci: false
    keeprunning: false
    startbrowser: true
  log:
    topic-enabled: true
    haconfig-enabled: true
  db:
    dir: ./.data

spring:
  output:
    ansi:
      enabled: ALWAYS
  boot:
    admin:
      client:
        enabled: true

logging:
  level:
    root: ERROR
    org.springframework: ERROR
    io.github.ridiekel.jeletask: DEBUG
    org.eclipse.paho: WARN
